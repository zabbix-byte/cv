    <!-- Spotlight Effect & Scroll Reveal Script -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Spotlight Effect — only update the hovered card, throttled to one frame.
        const SPOTLIGHT_SELECTOR = '.group, .rounded-\\[2rem\\]';
        const finePointer = window.matchMedia('(pointer: fine)').matches;
        if (finePointer) {
            let lastEvent = null, ticking = false;
            document.addEventListener('mousemove', e => {
                lastEvent = e;
                if (ticking) return;
                ticking = true;
                requestAnimationFrame(() => {
                    ticking = false;
                    const card = lastEvent.target.closest
                        ? lastEvent.target.closest(SPOTLIGHT_SELECTOR)
                        : null;
                    if (!card) return;
                    const rect = card.getBoundingClientRect();
                    card.style.setProperty('--mouse-x', (lastEvent.clientX - rect.left) + 'px');
                    card.style.setProperty('--mouse-y', (lastEvent.clientY - rect.top) + 'px');
                });
            }, { passive: true });
        }

        // Scroll Reveal
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal-visible');
                    observer.unobserve(entry.target); // Only animate once
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal-on-scroll').forEach((element) => {
            observer.observe(element);
        });
    });
    </script>
    
    <style>
    /* Spotlight Effect Base */
    .group, .rounded-\[2rem\] {
        position: relative;
    }
    
    /* The Glow Overlay */
    .group::after, .rounded-\[2rem\]::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: inherit;
        background: radial-gradient(
            600px circle at var(--mouse-x, 0) var(--mouse-y, 0),
            rgba(255, 255, 255, 0.06),
            transparent 40%
        );
        opacity: 0;
        transition: opacity 0.5s;
        pointer-events: none;
        z-index: 2;
    }
    
    .group:hover::after, .rounded-\[2rem\]:hover::after {
        opacity: 1;
    }
    </style>

    <!-- Simple fade in animation -->

        document.body.classList.add('opacity-100');
        document.body.classList.remove('opacity-0');
      });

    <style>
      body {
        transition: opacity 0.5s ease;
      }
      .opacity-0 { opacity: 0; }
      .opacity-100 { opacity: 1; }
      
      @keyframes blob {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      .animate-blob {
        animation: blob 7s infinite;
      }

        animation-delay: 2s;
      }
