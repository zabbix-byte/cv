<!DOCTYPE html>
<html lang="en" itemscope itemtype="http://schema.org/Person">
  <head>
    <!-- Made by @zabbix https://github.com/zabbix-byte | Vasile Ovidiu Ichim -->

    <title>{% block title %}Vasile Ovidiu Ichim{% endblock %}</title>
    <meta name="title" content="Vasile Ovidiu Ichim — Staff Engineer & Technical Lead">
    <meta name="description" content="Staff Engineer and CTO. Designing and scaling data-intensive systems — distributed pipelines, multi-tenant AI platforms, supply chain.">
    <meta name="robots" content="index, follow">
    <meta name="author" content="Vasile Ovidiu Ichim">
    <link rel="canonical" href="{% block canonical %}https://ztrunk.space/{% endblock %}">

    <meta property="og:type" content="profile">
    <meta property="og:url" content="https://ztrunk.space/">
    <meta property="og:title" content="Vasile Ovidiu Ichim — Staff Engineer & Technical Lead">
    <meta property="og:description" content="Staff Engineer and CTO. Designing and scaling data-intensive systems — distributed pipelines, multi-tenant AI platforms, supply chain.">
    <meta property="og:image" content="https://ztrunk.space/static/img/profile-picture.jpeg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Vasile Ovidiu Ichim — Staff Engineer & Technical Lead">
    <meta name="twitter:description" content="Staff Engineer and CTO. Designing and scaling data-intensive systems.">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Vasile Ovidiu Ichim",
      "alternateName": "zabbix-byte",
      "url": "https://ztrunk.space/",
      "image": "https://ztrunk.space/static/img/profile-picture.jpeg",
      "jobTitle": "Staff Engineer & Technical Lead",
      "description": "Staff Engineer and CTO designing and scaling data-intensive systems.",
      "email": "mailto:zabbix@ztrunk.space",
      "address": { "@type": "PostalAddress", "addressLocality": "Barcelona", "addressCountry": "ES" },
      "worksFor": { "@type": "Organization", "name": "Valerdat", "url": "https://valerdat.com" },
      "alumniOf": { "@type": "CollegeOrUniversity", "name": "The Open University" },
      "knowsAbout": ["Software Architecture", "Distributed Systems", "Machine Learning", "Time-series Forecasting", "Large Language Models", "Python", "Django", "AWS", "Data Engineering", "Supply Chain"],
      "sameAs": [
        "https://github.com/zabbix-byte",
        "https://www.linkedin.com/in/zabbix-byte/"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "itemListElement": [
        { "@type": "SiteNavigationElement", "position": 1, "name": "Experience", "url": "https://ztrunk.space/experience/" },
        { "@type": "SiteNavigationElement", "position": 2, "name": "Projects", "url": "https://ztrunk.space/projects/" },
        { "@type": "SiteNavigationElement", "position": 3, "name": "Research", "url": "https://ztrunk.space/research/" },
        { "@type": "SiteNavigationElement", "position": 4, "name": "Press", "url": "https://ztrunk.space/press/" },
        { "@type": "SiteNavigationElement", "position": 5, "name": "CV", "url": "https://ztrunk.space/download-cv/" }
      ]
    }
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
    <meta name="view-transition" content="same-origin">

    {% load static %}
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon-32.png' %}?v=7">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/favicon-16.png' %}?v=7">
    <link rel="icon" type="image/png" sizes="48x48" href="{% static 'img/favicon-48.png' %}?v=7">
    <link rel="icon" href="{% static 'img/favicon-32.png' %}?v=7" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/favicon-180.png' %}?v=7">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=STIX+Two+Text:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="preload" href="{% static 'fonts/stix-var-latin.woff2' %}" as="font" type="font/woff2" crossorigin>

    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=11">
    {% block head %}{% endblock %}
  </head>

  <body class="{% block body_class %}{% endblock %}">
    <main class="page{% block page_class %}{% endblock %}" id="main">
      {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
