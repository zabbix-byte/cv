<div class="bg-transparent p-0 h-full flex flex-col">

            <div class="flex items-center justify-between">
                <span class="text-sm text-[#151515] font-semibold">English</span>
                <span class="text-xs font-bold text-gray-700 bg-black/5 px-2.5 py-1 rounded-lg border border-black/10">Professional · C1</span>

    <a href="{% url 'download_cv_pdf' %}"
