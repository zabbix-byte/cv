{% load static %}
<section id="win-{{ win_id }}"
         class="ph-window{% if not win_open %} is-hidden{% endif %}"
         data-window="{{ win_id }}"
         style="width:{{ win_w|default:'720' }}px;{% if win_h %} height:{{ win_h }}px;{% endif %} left:{{ win_x|default:'120' }}px; top:{{ win_y|default:'70' }}px;">
  <header class="ph-titlebar tb-{{ win_color|default:'ink' }}" data-drag-handle>
    <span class="ph-title"><i class="{{ win_icon|default:'fas fa-folder' }}"></i>{{ title }}</span>
    <div class="ph-controls">
      <button type="button" class="ph-btn min" data-action="minimize" aria-label="Minimize window"><i class="fas fa-minus"></i></button>
      <button type="button" class="ph-btn max" data-action="maximize" aria-label="Maximize window"><i class="fas fa-expand"></i></button>
      <button type="button" class="ph-btn close" data-action="close" aria-label="Close window"><i class="fas fa-xmark"></i></button>
    </div>
  </header>
  <div class="ph-window-body">
    {% include body_template %}
  </div>
</section>
