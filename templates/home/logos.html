{% load static %}
<div class="ph-card px-5 py-4 mt-5">
  <p class="text-[11px] font-bold uppercase tracking-[0.14em] text-[#6b6b64] mb-3 font-mono">Worked with</p>
  <div class="flex flex-wrap items-center gap-6">

    <a href="https://www.ibm.com" target="_blank" rel="noopener" title="IBM" class="group flex items-center h-7">
      <img src="{% static 'img/logos/ibm.svg' %}"
           alt="IBM" class="h-4 object-contain opacity-60 group-hover:opacity-100 transition-opacity"
           onerror="this.style.display='none'; this.parentElement.insertAdjacentHTML('beforeend', '<span class=&quot;text-sm font-bold text-[#6b6b64] group-hover:text-[#151515]&quot;>IBM</span>');">
    </a>

    <a href="https://www.inditex.com" target="_blank" rel="noopener" title="Inditex" class="group flex items-center h-7">
      <img src="{% static 'img/logos/inditex_new.png' %}?v=1"
           alt="Inditex" class="h-5 object-contain opacity-60 group-hover:opacity-100 transition-opacity"
           onerror="this.style.display='none'; this.parentElement.insertAdjacentHTML('beforeend', '<span class=&quot;text-sm font-bold text-[#6b6b64]&quot;>INDITEX</span>');">
    </a>

    <a href="https://www.open.ac.uk" target="_blank" rel="noopener" title="The Open University" class="group flex items-center gap-2 h-7">
      <i class="fas fa-graduation-cap text-[#6b6b64] group-hover:text-purple-600 transition-colors text-sm"></i>
      <span class="text-sm font-semibold text-[#6b6b64] group-hover:text-[#151515] transition-colors">The Open University</span>
    </a>

  </div>
</div>
